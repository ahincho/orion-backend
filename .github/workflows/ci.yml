# =============================================================================
# CI - Lint, typecheck, and unit tests
# =============================================================================
# Triggered on PRs and pushes to main.
#
# Lint checks delegate to atomic reusables in spark-match-01-devops:
#   - actionlint, gitleaks, yamllint, eslint run as 4 parallel jobs.
#   - the ruleset's required 'lint' check is satisfied by an aggregate job
#     that depends on the 4 (preserves the [lint, build, test] gate without
#     forcing a ruleset update).
#
# Pin strategy: now `@main`. The recipes (actionlint, gitleaks, yamllint,
# eslint) were promoted from @dev to @main in spark-match-01-devops PR #45
# (after consumer validation in orion-backend PR #46 + orion-infrastructure
# PR #24). Future recipe work happens on @dev first; consumers move the
# pin only after a release PR merges @main in the cookbook repo. This
# aligns with the pin-by-env rule in spark-match-01-devops/docs/VERSIONING.md.
# =============================================================================

name: CI - Lint & Test

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
    paths:
      - '**.ts'
      - '**.mjs'
      - '**.json'
      - '**.yaml'
      - '**.yml'
      - '.github/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.base.json'
      - 'vitest.config.mts'
      - 'eslint.config.mjs'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Install dependencies (Node 24) - prep for build and test
  # ---------------------------------------------------------------------------
  install:
    name: Install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Cache npm dependencies
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node24-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node24-

      - name: Install dependencies
        run: npm ci

  # ---------------------------------------------------------------------------
  # Lint & Security - 4 atomic reusables from spark-match-01-devops
  # Each runs against this repo's code with environment-name=ci (informational
  # only; the recipes don't gate on the GH Environment for these checks).
  # ---------------------------------------------------------------------------
  actionlint:
    name: actionlint
    uses: spark-match/spark-match-01-devops/.github/workflows/actionlint.yml@main
    with:
      environment-name: ci

  gitleaks:
    name: gitleaks
    uses: spark-match/spark-match-01-devops/.github/workflows/gitleaks.yml@main
    with:
      environment-name: ci

  yamllint:
    name: yamllint
    uses: spark-match/spark-match-01-devops/.github/workflows/yamllint.yml@main
    with:
      environment-name: ci

  eslint:
    name: eslint
    uses: spark-match/spark-match-01-devops/.github/workflows/eslint.yml@main
    with:
      environment-name: ci
      eslint-version: 10

  # ---------------------------------------------------------------------------
  # Aggregate 'lint' job - satisfies ruleset 19160658's required [lint, build,
  # test] gate without forcing a ruleset update. The job itself does nothing
  # except report whether all 4 atomic checks passed.
  # ---------------------------------------------------------------------------
  lint:
    name: lint
    needs: [actionlint, gitleaks, yamllint, eslint]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Aggregate lint gate
        run: |
          RESULTS=(
            "actionlint=${{ needs.actionlint.result }}"
            "gitleaks=${{ needs.gitleaks.result }}"
            "yamllint=${{ needs.yamllint.result }}"
            "eslint=${{ needs.eslint.result }}"
          )
          FAILED=0
          for pair in "${RESULTS[@]}"; do
            name="${pair%%=*}"
            result="${pair#*=}"
            echo "  $name: $result"
            if [ "$result" != "success" ]; then
              FAILED=1
            fi
          done
          if [ "$FAILED" = "1" ]; then
            echo "::error::One or more atomic lint checks failed. See above."
            exit 1
          fi
          echo "All atomic lint checks passed."

  # ---------------------------------------------------------------------------
  # TypeScript typecheck (strict) - reports as 'build' context
  # ---------------------------------------------------------------------------
  build:
    name: build
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Cache npm dependencies
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node24-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node24-

      - name: Install dependencies
        run: npm ci

      - name: Build shared workspace
        run: npm run build:shared

      - name: Run typecheck
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # Unit tests + coverage (Vitest) - reports as 'test' context
  # ---------------------------------------------------------------------------
  test:
    name: test
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Cache npm dependencies
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node24-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node24-

      - name: Install dependencies
        run: npm ci

      - name: Build shared workspace
        run: npm run build:shared

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
