# =============================================================================
# CI - Lint, typecheck, and unit tests
# =============================================================================
# Triggered on PRs and pushes to main.
#
# Lint checks delegate to atomic reusables in spark-match-01-devops:
#   - actionlint, gitleaks, yamllint, eslint run as 4 parallel jobs.
#   - the ruleset's required 'lint' check is satisfied by an aggregate job
#     that depends on the 4 (preserves the [lint, build, test] gate without
#     forcing a ruleset update).
#
# Pin strategy: now `@main`. The recipes (actionlint, gitleaks, yamllint,
# eslint) were promoted from @dev to @main in spark-match-01-devops PR #45
# (after consumer validation in orion-backend PR #46 + orion-infrastructure
# PR #24). Future recipe work happens on @dev first; consumers move the
# pin only after a release PR merges @main in the cookbook repo. This
# aligns with the pin-by-env rule in spark-match-01-devops/docs/VERSIONING.md.
# =============================================================================

name: CI - Lint & Test

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
    paths:
      - '**.ts'
      - '**.mjs'
      - '**.json'
      - '**.yaml'
      - '**.yml'
      - '.github/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.base.json'
      - 'vitest.config.mts'
      - 'eslint.config.mjs'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Install dependencies (Node 24) - prep for build and test
  # ---------------------------------------------------------------------------
  install:
    name: Install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Cache npm dependencies
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node24-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node24-

      - name: Install dependencies
        run: npm ci

  # ---------------------------------------------------------------------------
  # Lint & Security - 5 atomic checks: 4 reusables from spark-match-01-devops
  # + cfn-nag inline (no reusable yet in spark-match-01-devops).
  # Each runs against this repo's code with environment-name=ci (informational
  # only; the recipes don't gate on the GH Environment for these checks).
  # ---------------------------------------------------------------------------
  actionlint:
    name: actionlint
    uses: spark-match/spark-match-01-devops/.github/workflows/actionlint.yml@main
    with:
      environment-name: ci

  gitleaks:
    name: gitleaks
    uses: spark-match/spark-match-01-devops/.github/workflows/gitleaks.yml@main
    with:
      environment-name: ci

  yamllint:
    name: yamllint
    uses: spark-match/spark-match-01-devops/.github/workflows/yamllint.yml@main
    with:
      environment-name: ci

  eslint:
    name: eslint
    uses: spark-match/spark-match-01-devops/.github/workflows/eslint.yml@main
    with:
      environment-name: ci
      eslint-version: 10

  # cfn-nag: scan SAM/CloudFormation templates for security anti-patterns.
  # Critical rules enforced (see .cfn-nag.yml for the full allowlist/denylist):
  #   F36: AWS::Lambda::Permission MUST specify SourceArn (cross-API confusion).
  #   F4:  IAM role trust policies MUST NOT allow wildcard service principal.
  # cfn-nag exit code is non-zero when any FAILING rule fires, so the job
  # fails the build automatically when violations are introduced.
  cfn-nag:
    name: cfn-nag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Ruby 3.3
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Install cfn-nag
        run: gem install cfn-nag --no-document

      - name: Scan SAM templates
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          TEMPLATES=( template.yaml contexts/**/template.yaml )
          for tpl in "${TEMPLATES[@]}"; do
            [ -f "$tpl" ] || continue
            echo "=== Scanning $tpl ==="
            cfn_nag_scan --input-path "$tpl" --output-format txt
          done

  # Custom check: every AWS::Lambda::Permission MUST specify SourceArn or
  # SourceAccount to scope invocation to a specific API Gateway / event
  # source. cfn-nag 0.8.10 does NOT have a built-in rule for this; the
  # custom script fills the gap. See orion-infrastructure ADR 0007 for
  # the rationale (cross-API confusion defense).
  lambda-permission-source-arn:
    name: lambda-permission-source-arn
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Verify every Lambda::Permission has SourceArn/SourceAccount
        run: python scripts/check-lambda-permission-source-arn.py

  # ---------------------------------------------------------------------------
  # Aggregate 'lint' job - satisfies ruleset 19160658's required [lint, build,
  # test] gate without forcing a ruleset update. The job itself does nothing
  # except report whether all 6 atomic checks passed.
  # ---------------------------------------------------------------------------
  lint:
    name: lint
    needs: [actionlint, gitleaks, yamllint, eslint, cfn-nag, lambda-permission-source-arn]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Aggregate lint gate
        run: |
          RESULTS=(
            "actionlint=${{ needs.actionlint.result }}"
            "gitleaks=${{ needs.gitleaks.result }}"
            "yamllint=${{ needs.yamllint.result }}"
            "eslint=${{ needs.eslint.result }}"
            "cfn-nag=${{ needs.cfn-nag.result }}"
            "lambda-permission-source-arn=${{ needs.lambda-permission-source-arn.result }}"
          )
          FAILED=0
          for pair in "${RESULTS[@]}"; do
            name="${pair%%=*}"
            result="${pair#*=}"
            echo "  $name: $result"
            if [ "$result" != "success" ]; then
              FAILED=1
            fi
          done
          if [ "$FAILED" = "1" ]; then
            echo "::error::One or more atomic lint checks failed. See above."
            exit 1
          fi
          echo "All atomic lint checks passed."

  # ---------------------------------------------------------------------------
  # TypeScript typecheck (strict) - reports as 'build' context
  # ---------------------------------------------------------------------------
  build:
    name: build
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Cache npm dependencies
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node24-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node24-

      - name: Install dependencies
        run: npm ci

      - name: Build shared workspace
        run: npm run build:shared

      - name: Run typecheck
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # Unit tests + coverage (Vitest) - reports as 'test' context
  # ---------------------------------------------------------------------------
  test:
    name: test
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Cache npm dependencies
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node24-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node24-

      - name: Install dependencies
        run: npm ci

      - name: Build shared workspace
        run: npm run build:shared

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
