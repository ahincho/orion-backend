# =============================================================================
# CI - Lint, typecheck, and unit tests
# =============================================================================
# Triggered on PRs and pushes to main.
#
# Lint checks delegate to atomic reusables in spark-match-01-devops:
#   - actionlint, gitleaks, yamllint, eslint run as 4 parallel jobs.
#   - the ruleset's required 'lint' check is satisfied by an aggregate job
#     that depends on the 4 (preserves the [lint, build, test] gate without
#     forcing a ruleset update).
#
# Pin strategy: now `@main`. The recipes (actionlint, gitleaks, yamllint,
# eslint) were promoted from @dev to @main in spark-match-01-devops PR #45
# (after consumer validation in orion-backend PR #46 + orion-infrastructure
# PR #24). Future recipe work happens on @dev first; consumers move the
# pin only after a release PR merges @main in the cookbook repo. This
# aligns with the pin-by-env rule in spark-match-01-devops/docs/VERSIONING.md.
# =============================================================================

name: CI - Lint & Test

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
    paths:
      - '**.ts'
      - '**.mjs'
      - '**.json'
      - '**.yaml'
      - '**.yml'
      - 'migrations/**'
      - '.github/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.base.json'
      - 'vitest.config.mts'
      - 'eslint.config.mjs'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Install dependencies (Node 24) - prep for build and test
  # ---------------------------------------------------------------------------
  install:
    name: Install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Cache npm dependencies
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node24-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node24-

      - name: Install dependencies
        run: npm ci

  # ---------------------------------------------------------------------------
  # Lint & Security - 6 atomic checks, all delegated to reusable workflows in
  # spark-match-01-devops (per docs/VERSIONING.md: callers pin by env, @main
  # for prod-stable recipes, @dev for in-flight changes).
  #
  # The 4 ecosystem recipes (actionlint, gitleaks, yamllint, eslint) were
  # already reusable. The cfn-nag and lambda-permission-source-arn recipes
  # were promoted in spark-match-01-devops PR #80 (merged to dev) and
  # #82 (promoted to main). Validated end-to-end in orion-backend PRs #102,
  # #104; inline copies removed here. cfn-nag recipe updated to per-file+no-config-path
  # scan in spark-match-01-devops PR #83 (avoids the .aws-sam/build/ output).
  # ---------------------------------------------------------------------------
  actionlint:
    name: actionlint
    uses: spark-match/spark-match-01-devops/.github/workflows/actionlint.yml@main
    with:
      environment-name: ci

  gitleaks:
    name: gitleaks
    uses: spark-match/spark-match-01-devops/.github/workflows/gitleaks.yml@main
    with:
      environment-name: ci

  yamllint:
    name: yamllint
    uses: spark-match/spark-match-01-devops/.github/workflows/yamllint.yml@main
    with:
      environment-name: ci

  eslint:
    name: eslint
    uses: spark-match/spark-match-01-devops/.github/workflows/eslint.yml@main
    with:
      environment-name: ci
      eslint-version: 10

  # cfn-nag: scan SAM/CloudFormation templates for security anti-patterns.
  # Critical rules enforced (see .cfn-nag.yml for the full allowlist/denylist):
  #   F36: AWS::Lambda::Permission MUST specify SourceArn (cross-API confusion).
  #   F4:  IAM role trust policies MUST NOT allow wildcard service principal.
  # Recipe: spark-match/spark-match-01-devops/.github/workflows/cfn-nag.yml@main
  # (Ruby 3.3 + cfn-nag 0.8.10 pinned; configurable via inputs).
  cfn-nag:
    name: cfn-nag
    uses: spark-match/spark-match-01-devops/.github/workflows/cfn-nag.yml@main
    with:
      environment-name: ci

  # Custom check: every AWS::Lambda::Permission MUST specify SourceArn or
  # SourceAccount. cfn-nag 0.8.10 does NOT have a built-in rule for this; the
  # Python stdlib script (now in spark-match-01-devops/scripts/) fills the gap.
  # See orion-infrastructure ADR 0007 for the rationale (cross-API confusion
  # defense).
  # Recipe:
  #   spark-match/spark-match-01-devops/.github/workflows/lambda-permission-source-arn.yml@main
  lambda-permission-source-arn:
    name: lambda-permission-source-arn
    uses: spark-match/spark-match-01-devops/.github/workflows/lambda-permission-source-arn.yml@main
    with:
      environment-name: ci

  # ---------------------------------------------------------------------------
  # Aggregate 'lint' job - satisfies ruleset 19160658's required [lint, build,
  # test] gate without forcing a ruleset update. The job itself does nothing
  # except report whether all 6 atomic checks passed.
  # ---------------------------------------------------------------------------
  lint:
    name: lint
    needs: [actionlint, gitleaks, yamllint, eslint, cfn-nag, lambda-permission-source-arn]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Aggregate lint gate
        run: |
          RESULTS=(
            "actionlint=${{ needs.actionlint.result }}"
            "gitleaks=${{ needs.gitleaks.result }}"
            "yamllint=${{ needs.yamllint.result }}"
            "eslint=${{ needs.eslint.result }}"
            "cfn-nag=${{ needs.cfn-nag.result }}"
            "lambda-permission-source-arn=${{ needs.lambda-permission-source-arn.result }}"
          )
          FAILED=0
          for pair in "${RESULTS[@]}"; do
            name="${pair%%=*}"
            result="${pair#*=}"
            echo "  $name: $result"
            if [ "$result" != "success" ]; then
              FAILED=1
            fi
          done
          if [ "$FAILED" = "1" ]; then
            echo "::error::One or more atomic lint checks failed. See above."
            exit 1
          fi
          echo "All atomic lint checks passed."

  # ---------------------------------------------------------------------------
  # TypeScript typecheck (strict) - reports as 'build' context
  # ---------------------------------------------------------------------------
  build:
    name: build
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Cache npm dependencies
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node24-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node24-

      - name: Install dependencies
        run: npm ci

      - name: Build shared workspace
        run: npm run build:shared

      - name: Run typecheck
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # Unit tests + coverage (Vitest) - reports as 'test' context
  # ---------------------------------------------------------------------------
  test:
    name: test
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Cache npm dependencies
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node24-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node24-

      - name: Install dependencies
        run: npm ci

      - name: Build shared workspace
        run: npm run build:shared

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Migrations dry-run - validates that every *.sql file in migrations/
  # applies cleanly against a fresh Postgres 16 instance. Reusable from
  # spark-match-01-devops (ecosystem layer, no AWS, no caller secrets).
  #
  # Why this exists: the V009 migration that landed in PR #117 was self-
  # defeating (UPDATE role before DROP CONSTRAINT) and would have stayed
  # broken indefinitely without the auto-migrate step added to deploy.yml
  # in PR #120. A pure DDL bug of the same shape (e.g. ADD CONSTRAINT that
  # contradicts an existing CHECK) would have passed the unit-test gate
  # but failed the moment the production migrator ran. This job catches
  # that class of bug in CI before the change reaches main.
  #
  # Pin: @main. The recipe was added in spark-match-01-devops PR #91,
  # promoted @dev -> @main in PR #92, briefly rolled back to @dev for
  # the v9 --schema array bug fix (commit d8b819c), and is back on
  # @main as of cookbook PR #93. Validation runs in this consumer
  # (orion-backend PR #122); once merged the pin stays at @main.
  # ---------------------------------------------------------------------------
  migrations-dry-run:
    name: migrations-dry-run
    uses: spark-match/spark-match-01-devops/.github/workflows/migrations-dry-run.yml@main
    with:
      environment-name: ci
      postgres-version: '17'
