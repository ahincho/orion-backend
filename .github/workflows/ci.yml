# =============================================================================
# CI - Lint, typecheck, and unit tests
# =============================================================================
# Triggered on PRs to main. Calls the reusable workflow from
# spark-match-01-devops (CI - Lint & Security).
# =============================================================================

name: CI - Lint & Test

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
    paths:
      - '**.ts'
      - '**.mjs'
      - '**.json'
      - '**.yaml'
      - '**.yml'
      - '.github/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.base.json'
      - 'vitest.config.mts'
      - 'eslint.config.mjs'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Install dependencies (Node 24) - prep for build and test
  # ---------------------------------------------------------------------------
  install:
    name: Install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Cache npm dependencies
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node24-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node24-

      - name: Install dependencies
        run: npm ci

  # ---------------------------------------------------------------------------
  # Lint & Security - actionlint + gitleaks + yamllint
  # Inline until spark-match-01-devops reusable exposes workflow_call.
  # Reports as the 'lint' status context so the main ruleset can require it.
  # ---------------------------------------------------------------------------
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download actionlint binary
        id: get_actionlint
        run: bash <(curl --fail --silent --show-error --location https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash)
        shell: bash

      - name: Run actionlint
        run: ${{ steps.get_actionlint.outputs.executable }} -color

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yamllint
        run: pip install --quiet yamllint==1.35.1

      - name: Run yamllint
        run: yamllint -c .yamllint.yml .

  # ---------------------------------------------------------------------------
  # TypeScript typecheck (strict) - reports as 'build' context
  # ---------------------------------------------------------------------------
  build:
    name: build
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Cache npm dependencies
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node24-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node24-

      - name: Install dependencies
        run: npm ci

      - name: Build shared workspace
        run: npm run build:shared

      - name: Run typecheck
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # Unit tests + coverage (Vitest) - reports as 'test' context
  # ---------------------------------------------------------------------------
  test:
    name: test
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Cache npm dependencies
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node24-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node24-

      - name: Install dependencies
        run: npm ci

      - name: Build shared workspace
        run: npm run build:shared

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
