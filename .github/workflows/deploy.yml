# =============================================================================
# CD - Deploy ORION backend via SAM
# =============================================================================
# Triggered on push to main. Delegates the build + deploy steps to the
# `sam-deploy.yml` reusable in spark-match-01-devops. The reusable handles:
#   - checkout
#   - node + npm cache
#   - AWS OIDC credentials (secrets.AWS_DEPLOY_ROLE_ARN)
#   - npm ci + pre-build + Lambda Layers build
#   - SAM CLI install + validate + build --use-container
#   - sam deploy --config-env <env> (idempotent, no-fail-on-empty-changeset)
#
# Phase 0: dev only. To add prod: a second job below + a `prod` GH
# Environment in repo settings holding AWS_DEPLOY_ROLE_ARN_PROD.
# =============================================================================

name: CD - Deploy

on:
  push:
    branches: [main]
    paths:
      - '**.ts'
      - '**.mjs'
      - '**.json'
      - '**.yaml'
      - '**.yml'
      - 'template.yaml'
      - 'samconfig.toml'
      - 'layers/**'
      - 'shared/**'
      - 'contexts/**'

# `id-token: write` is required at the caller side so the reusable workflow
# can mint an OIDC JWT for the AWS role assumption. The reusable itself
# declares its own `permissions: id-token: write`, but the CALLER must
# also opt in (GitHub OIDC token is generated from the caller's permissions
# context).
permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # never cancel an in-progress deploy

jobs:
  deploy-dev:
    name: Deploy to dev
    uses: spark-match/spark-match-01-devops/.github/workflows/sam-deploy.yml@main
    with:
      environment-name: dev
      aws-region: us-east-1
      stack-name: orion-backend-dev
      sam-template: template.yaml
      sam-config-env: default
      s3-bucket: orion-sam-artifacts-dev
      node-version: '24'
      sam-cli-version: 1.151.0
      pre-build-script: build:shared
      build-layers-script: layer:build:all
    secrets:
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
