# =============================================================================
# CD - Deploy ORION backend via SAM
# =============================================================================
# Triggered on push to main. Installs SAM CLI via aws-actions/setup-sam,
# then runs sam build + sam deploy directly via bash (skipping the broken
# `sam validate` step that the spark-match-01-devops reusable sam-deploy.yml
# triggers under SAM CLI 1.145/1.151).
#
# Two-job pipeline:
#   1. resolve-vpc-config  -> reads /orion/lambda/{vpc-subnet-ids,security-group-id}
#                              from SSM, emits a SAM CLI --parameter-overrides string
#                              of the form "VpcSubnetIds=subnet-X,subnet-Y LambdaSecurityGroupId=sg-Z".
#   2. deploy-dev          -> build + deploy via SAM CLI.
#
# Phase 0: dev only. To add prod: a second pair of jobs + a `prod` GH
# Environment in repo settings holding AWS_DEPLOY_ROLE_ARN_PROD.
# =============================================================================

name: CD - Deploy

on:
  push:
    branches: [main]
    paths:
      - '**.ts'
      - '**.mjs'
      - '**.json'
      - '**.yaml'
      - '**.yml'
      - 'template.yaml'
      - 'samconfig.toml'
      - 'layers/**'
      - 'shared/**'
      - 'contexts/**'

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Phase 1: resolve VPC params (subnet IDs + Lambda SG) from SSM.
  # orion-infrastructure publishes them via its `ssm-bootstrap` module;
  # this job reads them and exposes a SAM-CLI-friendly string that the SAM
  # CLI consumes as `--parameter-overrides`.
  #
  # Output shape (raw, consumed by `sam deploy --parameter-overrides ...`):
  #   VpcSubnetIds=subnet-X,subnet-Y LambdaSecurityGroupId=sg-Z
  # ---------------------------------------------------------------------------
  resolve-vpc-config:
    name: Resolve VPC config from SSM
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      parameter-overrides: ${{ steps.vpc.outputs.parameter-overrides }}
    steps:
      - name: Configure AWS credentials (OIDC, deploy role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Fetch VPC params from SSM and build --parameter-overrides string
        id: vpc
        run: |
          set -euo pipefail
          SUBNET_IDS=$(aws ssm get-parameter \
            --name /orion/lambda/vpc-subnet-ids \
            --query "Parameter.Value" --output text --region us-east-1)
          SG_ID=$(aws ssm get-parameter \
            --name /orion/lambda/security-group-id \
            --query "Parameter.Value" --output text --region us-east-1)
          if [ -z "$SUBNET_IDS" ] || [ -z "$SG_ID" ]; then
            echo "::error::Empty SSM value(s); abort."
            exit 1
          fi
          # SAM CLI List type is comma-separated, no shell-escape needed.
          PARAM_OVERRIDES="VpcSubnetIds=${SUBNET_IDS} LambdaSecurityGroupId=${SG_ID}"
          echo "Resolved --parameter-overrides: $PARAM_OVERRIDES"
          echo "parameter-overrides=$PARAM_OVERRIDES" >> "$GITHUB_OUTPUT"

  deploy-dev:
    name: Deploy to dev
    needs: resolve-vpc-config
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Configure AWS credentials (OIDC, deploy role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install dependencies
        run: npm ci

      - name: Pre-build step
        run: npm run build:shared

      - name: Build Lambda Layers
        run: npm run layer:build:all

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v3
        with:
          version: 1.163.0
          use-installer: true

      - name: SAM Build
        run: sam build --template template.yaml --use-container

      - name: SAM Deploy
        run: |
          set -euo pipefail
          DEPLOY_ARGS="--config-env dev \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --region us-east-1 \
            --parameter-overrides ${{ needs.resolve-vpc-config.outputs.parameter-overrides }}"
          echo "Running: sam deploy $DEPLOY_ARGS"
          # shellcheck disable=SC2086
          sam deploy $DEPLOY_ARGS
