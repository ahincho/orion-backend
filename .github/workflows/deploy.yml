# =============================================================================
# CD - Deploy ORION backend via SAM
# =============================================================================
# Triggered on push to main. Installs SAM CLI via aws-actions/setup-sam,
# then runs sam build + sam deploy directly via bash (skipping the broken
# `sam validate` step that the spark-match-01-devops reusable sam-deploy.yml
# triggers under SAM CLI 1.145/1.151).
#
# Two-job pipeline:
#   1. resolve-vpc-config  -> reads /orion/lambda/{vpc-subnet-ids,security-group-id}
#                              from SSM, emits a SAM CLI --parameter-overrides string
#                              of the form "VpcSubnetIds=subnet-X,subnet-Y LambdaSecurityGroupId=sg-Z".
#   2. deploy-dev          -> build + deploy via SAM CLI.
#
# Phase 0: dev only. To add prod: a second pair of jobs + a `prod` GH
# Environment in repo settings holding AWS_DEPLOY_ROLE_ARN_PROD.
# =============================================================================

name: CD - Deploy

on:
  push:
    branches: [main]
    paths:
      - '**.ts'
      - '**.mjs'
      - '**.json'
      - '**.yaml'
      - '**.yml'
      - 'template.yaml'
      - 'samconfig.toml'
      - 'layers/**'
      - 'shared/**'
      - 'contexts/**'

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Phase 1: resolve VPC params (subnet IDs + Lambda SG) from SSM.
  # orion-infrastructure publishes them via its `ssm-bootstrap` module;
  # this job reads them and exposes a SAM-CLI-friendly string that the SAM
  # CLI consumes as `--parameter-overrides`.
  #
  # Output shape (raw, consumed by `sam deploy --parameter-overrides ...`):
  #   VpcSubnetIds=subnet-X,subnet-Y LambdaSecurityGroupId=sg-Z
  # ---------------------------------------------------------------------------
  resolve-vpc-config:
    name: Resolve VPC config from SSM
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      parameter-overrides: ${{ steps.vpc.outputs.parameter-overrides }}
    steps:
      - name: Configure AWS credentials (OIDC, deploy role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Fetch VPC + authorizer role params from SSM and build --parameter-overrides string
        id: vpc
        run: |
          set -euo pipefail
          SUBNET_IDS=$(aws ssm get-parameter \
            --name /orion/lambda/vpc-subnet-ids \
            --query "Parameter.Value" --output text --region us-east-1)
          SG_ID=$(aws ssm get-parameter \
            --name /orion/lambda/security-group-id \
            --query "Parameter.Value" --output text --region us-east-1)
          # Authorizer invoke role ARN (modules/iam-apigateway-authorizer-invoke
          # in orion-infrastructure). Usado por AWS::ApiGatewayV2::Authorizer
          # .AuthorizerCredentialsArn (ver template.yaml). Se lee de SSM en vez
          # de hardcodear el default en template.yaml para que la rotacion del
          # role no requiera PR a orion-backend.
          AUTHORIZER_ROLE_ARN=$(aws ssm get-parameter \
            --name /orion/iam/apigateway-authorizer-invoke-role-arn \
            --query "Parameter.Value" --output text --region us-east-1)
          if [ -z "$SUBNET_IDS" ] || [ -z "$SG_ID" ] || [ -z "$AUTHORIZER_ROLE_ARN" ]; then
            echo "::error::Empty SSM value(s) (subnets=$SUBNET_IDS sg=$SG_ID authorizer=$AUTHORIZER_ROLE_ARN); abort."
            exit 1
          fi
          # SAM CLI List type is comma-separated, no shell-escape needed.
          PARAM_OVERRIDES="VpcSubnetIds=${SUBNET_IDS} LambdaSecurityGroupId=${SG_ID} ApigatewayAuthorizerInvokeRoleArn=${AUTHORIZER_ROLE_ARN}"
          echo "Resolved --parameter-overrides: $PARAM_OVERRIDES"
          echo "parameter-overrides=$PARAM_OVERRIDES" >> "$GITHUB_OUTPUT"

  deploy-dev:
    name: Deploy to dev
    needs: resolve-vpc-config
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Configure AWS credentials (OIDC, deploy role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Reconcile stack state (delete if unrecoverable)
        # CloudFormation rule: a stack whose FIRST create failed lands in
        # ROLLBACK_COMPLETE, a terminal state that can only be deleted, never
        # updated. Until the stack reaches CREATE_COMPLETE once, every retry is
        # a fresh CREATE; a leftover ROLLBACK_COMPLETE (or other terminal state)
        # makes the next `sam deploy` fail instantly at CreateChangeSet with
        # "... is in ROLLBACK_COMPLETE state and can not be updated".
        # This step makes the pipeline self-healing: it deletes a stack stuck in
        # any non-updatable state (and waits for the deletion) so the deploy
        # below always starts from a clean, deployable state.
        run: |
          set -euo pipefail
          STACK_NAME=orion-backend-dev
          REGION=us-east-1
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" --region "$REGION" \
            --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          echo "Current stack status: $STATUS"
          case "$STATUS" in
            DOES_NOT_EXIST)
              echo "No existing stack; proceeding with fresh create."
              ;;
            ROLLBACK_COMPLETE|ROLLBACK_FAILED|CREATE_FAILED|DELETE_FAILED|REVIEW_IN_PROGRESS)
              echo "::warning::Stack in non-updatable state '$STATUS'; deleting before deploy."
              aws cloudformation delete-stack --stack-name "$STACK_NAME" --region "$REGION"
              echo "Waiting for stack-delete-complete..."
              aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME" --region "$REGION"
              echo "Stack deleted; proceeding with fresh create."
              ;;
            *)
              echo "Stack in updatable state '$STATUS'; proceeding with update."
              ;;
          esac

      - name: Install dependencies
        run: npm ci

      - name: Pre-build step
        run: npm run build:shared

      - name: Build contexts (tsc)
        # Each bounded context under contexts/ compiles its TypeScript to ./dist,
        # which the nested stack's CodeUri (./dist) zips up for Lambda. SAM CLI
        # does NOT transpile TS for nested stacks on its own, so this step is
        # required for the Function Handlers to load.
        run: npm run build --workspaces --if-present

      - name: Build Lambda Layers
        run: npm run layer:build:all

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v3
        with:
          version: 1.163.0

      - name: SAM Build
        # SAM CLI 1.137-1.163 has a parser bug that triggers
        # `Error: Unexpected character: 'u' at line 10 col 9` when ANY
        # samconfig.toml is present in CWD. We bypass it by passing an
        # empty config-file pointing outside the repo (samconfig.toml
        # remains only as documentation; deploy values are inlined below).
        run: |
          set -euo pipefail
          echo 'version = 0.1' > /tmp/samconfig-bypass.toml
          # SAM CLI lets us point config-file elsewhere. The deploy stage
          # does the same.
          sam build --template template.yaml --config-file /tmp/samconfig-bypass.toml

      - name: SAM Deploy
        run: |
          set -euo pipefail
          echo 'version = 0.1' > /tmp/samconfig-bypass.toml
          DEPLOY_ARGS="--config-file /tmp/samconfig-bypass.toml \
            --stack-name orion-backend-dev \
            --s3-bucket orion-sam-artifacts-dev \
            --s3-prefix orion-backend \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --disable-rollback \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --region us-east-1 \
            --parameter-overrides ${{ needs.resolve-vpc-config.outputs.parameter-overrides }}"
          echo "Running: sam deploy $DEPLOY_ARGS"
          # shellcheck disable=SC2086
          sam deploy $DEPLOY_ARGS

      - name: Dump stack failure events (diagnostics)
        # On failure, --disable-rollback leaves the parent + nested stacks in
        # CREATE_FAILED with resources retained. Dump every CREATE_FAILED /
        # UPDATE_FAILED reason (parent AND each nested stack) straight into the
        # CI log so the leaf cause is visible without local AWS access. The
        # next run's "Reconcile stack state" step deletes the failed stack.
        if: failure()
        run: |
          set +e
          REGION=us-east-1
          echo "===== Parent stack: orion-backend-dev ====="
          aws cloudformation describe-stack-events \
            --stack-name orion-backend-dev --region "$REGION" \
            --query "StackEvents[?contains(ResourceStatus, 'FAILED')].[LogicalResourceId,ResourceType,ResourceStatusReason]" \
            --output text
          echo "===== Nested stacks ====="
          for NESTED in $(aws cloudformation list-stack-resources \
            --stack-name orion-backend-dev --region "$REGION" \
            --query "StackResourceSummaries[?ResourceType=='AWS::CloudFormation::Stack'].PhysicalResourceId" \
            --output text); do
            echo "----- $NESTED -----"
            aws cloudformation describe-stack-events \
              --stack-name "$NESTED" --region "$REGION" \
              --query "StackEvents[?contains(ResourceStatus, 'FAILED')].[LogicalResourceId,ResourceType,ResourceStatusReason]" \
              --output text
          done
