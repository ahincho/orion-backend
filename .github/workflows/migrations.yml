# =============================================================================
# Migrations - manual operator trigger (orion-backend)
# =============================================================================
# TEMPORARY MINIMAL VERSION for PR #124 diagnostic. Replaces the
# preflight gate + migrate pattern with a single job that calls the
# cookbook recipe directly. If this works, the issue was interaction
# between gate + migrate (likely needs: gate blocking uses:). If
# migrate still does not appear in jobs API, the issue is in the
# uses: invocation itself (cross-owner secret handshake).
# =============================================================================

name: Migrations - orion-backend

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment.'
        type: choice
        required: true
        default: 'dev'
        options:
          - dev

permissions:
  contents: read
  id-token: write

jobs:
  migrate:
    # environment: is required here so that ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
    # in this job's context resolves to the dev-env-scoped secret (not null).
    # Without it, the migrate job runs in the wrapper repo's default context,
    # where the secret is undefined, and the cookbook's aws-actions/
    # configure-aws-credentials step fails to assume the OIDC role.
    environment: ${{ inputs.environment }}
    uses: spark-match/spark-match-01-devops/.github/workflows/migrations.yml@main
    with:
      environment-name: ${{ inputs.environment }}
      function-name: orion-identity-migrate-${{ inputs.environment }}
    secrets:
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
