# =============================================================================
# Migrations - manual operator trigger (orion-backend)
# =============================================================================
# This wrapper exposes a workflow_dispatch UI for ops to invoke the
# orion-identity-migrate-<env> Lambda on demand (hotfix migrations, status
# checks before prod approval, etc.) without going through a full SAM
# deploy.
#
# Architecture:
#   1. gate job - enforces the GH Environment approval flow in the caller
#      repo (this one). Runs a no-op echo step; the gate value is that the
#      job must clear the `environment: <name>` approval rules before it
#      can start. Uses `environment: ${{ inputs.environment }}` directly
#      (allowed because this is a regular runs-on job).
#   2. migrate job - calls the cookbook's migrations.yml reusable. Depends
#      on gate via `needs: gate`. Cannot declare `environment:` (GitHub
#      Actions does not support that keyword on jobs that use `uses:` - see
#      https://docs.github.com/en/actions/reference/workflows-and-actions/reusing-workflow-configurations#supported-keywords-for-jobs-that-call-a-reusable-workflow).
#      Reads `secrets.AWS_DEPLOY_ROLE_ARN` from the **repository** scope
#      (not env scope) so it resolves correctly in the migrate job's
#      context. The gate job's approval flow is the human-in-the-loop
#      check; the repo-level secret is necessary because env-scoped
#      secrets are only available to jobs with matching `environment:`.
#
# Companion cookbook recipe: spark-match-01-devops PR #96 removed the
# recipe-level environment gate because GitHub resolves it in the callee
# repo, not the caller (cookbook has no 'dev' env). The gate therefore
# moved into the wrapper here.
#
# Pin: @main. The cookbook recipe is now stable on main (PR #97 promoted
# PR #96's fix), so this wrapper pins to @main per spark-match-01-devops/
# docs/VERSIONING.md.
#
# To add prod support:
#   1. Add `prod` to the `environment` choice below.
#   2. Create a GH Environment named `prod` in this repo with
#      AWS_DEPLOY_ROLE_ARN (the prod migrate role).
#   3. Provision `orion-identity-migrate-prod` Lambda in the prod stack.
# =============================================================================

name: Migrations - orion-backend

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (GH Environment gate + function name suffix).'
        type: choice
        required: true
        default: 'dev'
        options:
          - dev

# Concurrency note: removed the workflow-level concurrency block. The
# cookbook recipe declares its own concurrency group
# (`migrations-${{ inputs.environment-name }}`, same key as the would-be
# wrapper group) so the recipe handles serialization on its own. A
# wrapper-level concurrency block that shares the same key as the
# recipe causes GitHub Actions to silently drop the `uses:` job in
# some evaluation paths (diagnosed by checking run 29963988221 - gate
# ran and completed, but the migrate job never started and never
# appeared in the jobs API).

permissions:
  contents: read
  id-token: write

jobs:
  # Preflight gate: enforces the GH Environment approval flow. The job
  # itself does nothing useful; its value is that it must clear the
  # `environment: <name>` approval rules before it can start.
  gate:
    name: "gate (env=${{ inputs.environment }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Environment gate cleared
        run: |
          set -euo pipefail
          echo "Environment '${{ inputs.environment }}' gate approved (GH Environment approval rules honored)."
          echo "Cookbook recipe will now invoke the migrator Lambda."

  # The actual migration invocation via the cookbook reusable. NO
  # `needs: gate` (the gate is enforced by GitHub Environment approval
  # rules on the gate job, not by job-level dependencies). NO
  # `environment:` on this job (the keyword is rejected by GitHub
  # Actions on uses: jobs - confirmed by the API error
  # "failed to parse workflow: Required property is missing: runs-on").
  # Reads AWS_DEPLOY_ROLE_ARN from repo-level scope (set via
  # `gh secret set AWS_DEPLOY_ROLE_ARN`, see orion-infrastructure
  # Terraform or this PR's setup notes).
  migrate:
    name: "migrate (env=${{ inputs.environment }})"
    uses: spark-match/spark-match-01-devops/.github/workflows/migrations.yml@main
    with:
      environment-name: ${{ inputs.environment }}
      function-name: orion-identity-migrate-${{ inputs.environment }}
    secrets:
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
