# =============================================================================
# Debug - SAM CLI parser bisect
# =============================================================================
# Runs sam validate and sam build on each PR branch so we can bisect the
# 'Unexpected character: u at line 10 col 9' parser bug without polluting main.
# =============================================================================
name: Debug - SAM parser bisect

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sam-validate:
    name: sam validate (--debug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/setup-sam@v3
        with:
          version: '1.163.0'
      - name: cat template.yaml (sha256)
        run: sha256sum template.yaml
      - name: sam validate --debug
        # SAM CLI 1.137-1.163 bug: parses samconfig.toml as YAML. Bypass with
        # --config-file pointing outside the repo. See PR #62.
        run: |
          set -o pipefail
          echo 'version = 0.1' > /tmp/samconfig-bypass.toml
          sam validate --debug --template template.yaml --lint --config-file /tmp/samconfig-bypass.toml 2>&1 | tee validate.log
      - name: sam build --debug
        # The nested stack CodeUri's point at ./dist, so this build would only
        # succeed if every context had a dist/ tree (the deploy workflow
        # generates it). For parser-bisect purposes we only need sam validate
        # below; skip sam build here to keep the job fast.
        run: echo 'sam build skipped: see Deploy to dev job for a real build'
      - name: result
        if: always()
        run: |
          grep -E 'Unexpected character|Linting complete|0 lint|template is valid' validate.log || true
          if grep -q 'Unexpected character' validate.log; then exit 1; fi
