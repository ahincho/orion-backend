# =============================================================================
# CodeQL - Static analysis for TypeScript and JavaScript
# =============================================================================
# Scans the source tree with GitHub CodeQL on every push to main and on every
# PR against main. Languages are explicit; gh-codeql init for `bash` on this
# repo would fail because no shell scripts live in the tree (CodeQL refuses
# to register a language it cannot detect). If a future change introduces
# shell scripts, add `bash` to the matrix manually.
# =============================================================================

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [typescript, javascript]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
