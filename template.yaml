# =============================================================================
# ORION Backend - Root SAM template
# =============================================================================
# Orchestrates the HTTP API (v2), Lambda Authorizer, shared Lambda Layers,
# and one nested stack per bounded context.
#
# Runtime: nodejs24.x (LTS Krypton, EOL Apr 2028).
# All runtime config is sourced from SSM via {{resolve:ssm:...}} so that
# orion-infrastructure (Terraform) is the single source of truth for ARNs.
#
# Phase 1 (dev): all Lambdas are deployed inside the orion-dev VPC so they
# can reach the RDS Postgres instance over private subnets. Subnet IDs and
# the shared Lambda security group are passed in as SAM parameters (populated
# by deploy.yml via `aws ssm get-parameter` against the SSM parameters
# published by orion-infrastructure).
#
# Architecture note (Phase 1 SAM quirk):
#   SAM CLI forbids `Events: ApiId: !Ref HttpApiId` in nested stacks when
#   HttpApiId is a string parameter -- it requires an in-template
#   `AWS::Serverless::HttpApi` resource reference. We therefore declare the
#   `AWS::ApiGatewayV2::Integration` + `AWS::ApiGatewayV2::Route` pairs in THIS
#   template, pointing at the InvokeArns exported by each nested stack.
#   Nested stacks only own their Lambda + IAM role + output ARNs.
# =============================================================================

AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ORION backend - serverless DDD+EDA monolith on AWS Lambda.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
    Description: Deployment environment.

  # SSM parameters (populated by orion-infrastructure Terraform module)
  JwtSecretArn:
    Type: String
    Description: ARN of the JWT signing secret in Secrets Manager.
    Default: ''

  DbSecretArn:
    Type: String
    Description: ARN of the PostgreSQL credentials secret.
    Default: ''

  EventBridgeBusArn:
    Type: String
    Description: ARN of the ORION EventBridge bus.
    Default: ''

  ApigatewayAuthorizerInvokeRoleArn:
    Type: String
    Description: 'ARN of the IAM role that API Gateway assumes when invoking the Lambda Authorizer. This role must trust `apigateway.amazonaws.com` and grant `lambda:InvokeFunction` on the authorizer Lambda. The role is provisioned by orion-infrastructure (currently named `apigateway-authorizer-invoke-role-dev`, pending Terraform module rename; see orion-infrastructure follow-up).'
    Default: 'arn:aws:iam::681526276858:role/apigateway-authorizer-invoke-role-dev'

  # Phase 1 - VPC attachment for Lambda functions.
  VpcSubnetIds:
    Type: String
    Description: 'Comma-separated subnet IDs (>= 2 AZs, private subnets where RDS lives) for VPC-attached Lambdas. Use ''""'' for local dev.'
    Default: '""'

  LambdaSecurityGroupId:
    Type: String
    Description: Security Group ID attached to all VPC Lambdas (must allow egress to RDS port 5432 if RDS is reachable). Empty = local dev.
    Default: ''

Globals:
  Function:
    Runtime: nodejs24.x
    MemorySize: 512
    Timeout: 15
    Tracing: Active
    Architectures: [x86_64]
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        LOG_LEVEL: INFO
        POWERTOOLS_SERVICE_NAME: !Sub "orion-backend-${Environment}"
        NODE_OPTIONS: --enable-source-maps
        # NOTE: runtime config (DB secret ARN, JWT secret ARN, event bus ARN,
        # CORS origins) is read directly from SSM at runtime by the Lambda
        # handlers via @orion/shared/infra (createSsmReader, createSecretsReader).
        # It is NOT injected as env vars to avoid CloudFormation SSM
        # SecureString resolve:~true format restrictions.

Resources:
  # ---------------------------------------------------------------------------
  # HTTP API v2 - public entry point for all ORION APIs
  # ---------------------------------------------------------------------------
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "orion-http-api-${Environment}"
      ProtocolType: HTTP
      Description: ORION backend public HTTP API.
      CorsConfiguration:
        AllowOrigins: ['*']
        AllowMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        AllowHeaders: [Content-Type, Authorization, X-Correlation-Id]
        ExposeHeaders: [X-Correlation-Id]
        MaxAge: 86400

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: !Ref Environment
      AutoDeploy: true
      Description: !Sub "Auto-deployed stage for ${Environment}"

  # ---------------------------------------------------------------------------
  # Lambda Authorizer (REQUEST type) - validates JWTs signed with our HS256 secret
  # The authorizer Lambda lives in a nested stack (only the stack's InvokeArn is
  # referenced here so the Authorizer can be wired up).
  # ---------------------------------------------------------------------------
  AuthorizerStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./contexts/authorizer/template.yaml
      Parameters:
        Environment: !Ref Environment
        VpcSubnetIds: !Ref VpcSubnetIds
        LambdaSecurityGroupId: !Ref LambdaSecurityGroupId
        NodeSharedLayerArn: !Ref NodeSharedLayer
        NodeRuntimeLayerArn: !Ref NodeRuntimeLayer

  ApiGatewayAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref HttpApi
      Name: orion-jwt-authorizer
      AuthorizerType: REQUEST
      AuthorizerUri: !GetAtt AuthorizerStack.Outputs.AuthorizerFunctionInvokeArn
      # AuthorizerCredentialsArn: IAM role que API Gateway ASSUME para invocar
      # el authorizer Lambda. Distinto del AuthorizerFunctionRole (el Lambda
      # execution role del authorizer, que solo `lambda.amazonaws.com` puede
      # asumir). Sin este role dedicado, API Gateway no puede invocar el
      # authorizer y devuelve 500 en todas las rutas protegidas.
      AuthorizerCredentialsArn: !Ref ApigatewayAuthorizerInvokeRoleArn
      IdentitySource:
        - $request.header.Authorization
      AuthorizerResultTtlInSeconds: 300
      AuthorizerPayloadFormatVersion: '2.0'
      # EnableSimpleResponses: SI. El authorizer devuelve el formato simple
      # `{isAuthorized, context}` (ver contexts/authorizer/src/handler.ts).
      # Habilitar simple responses alinea API Gateway con el formato del
      # handler y permite que el `context` (userId/email/role) llegue al
      # target Lambda via `event.requestContext.authorizer.lambda.*`.
      # Sin simple responses, API Gateway espera un IAM policy con
      # `principalId` (que el handler no devuelve) y devuelve 500
      # "Policy response did not include principalId".
      # Nota: `EnableSimpleResponses` es INMUTABLE despues de crear el
      # authorizer. Si se necesita cambiar, hay que borrar + recrear el
      # authorizer (no es actualizable via UpdateAuthorizer). Por eso
      # hay que declararlo explicitamente aqui (no confiar en el default,
      # que es `false` para v2.0).
      EnableSimpleResponses: true

  # ---------------------------------------------------------------------------
  # Identity bounded context (nested stack) - users + JWT issuance
  # Routes are wired here in root via raw AWS::ApiGatewayV2::Route resources.
  # ---------------------------------------------------------------------------
  IdentityStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./contexts/identity/template.yaml
      Parameters:
        Environment: !Ref Environment
        VpcSubnetIds: !Ref VpcSubnetIds
        LambdaSecurityGroupId: !Ref LambdaSecurityGroupId
        NodeSharedLayerArn: !Ref NodeSharedLayer
        NodeRuntimeLayerArn: !Ref NodeRuntimeLayer

  IdentityRegisterIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt IdentityStack.Outputs.IdentityRegisterFunctionArn
      PayloadFormatVersion: '2.0'

  IdentityRegisterRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /v1/auth/register
      Target: !Sub "integrations/${IdentityRegisterIntegration.IntegrationId}"

  IdentityLoginIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt IdentityStack.Outputs.IdentityLoginFunctionArn
      PayloadFormatVersion: '2.0'

  IdentityLoginRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /v1/auth/login
      Target: !Sub "integrations/${IdentityLoginIntegration.IntegrationId}"

  IdentityGetMeIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt IdentityStack.Outputs.IdentityGetMeFunctionArn
      PayloadFormatVersion: '2.0'

  IdentityGetMeRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /v1/users/me
      Target: !Sub "integrations/${IdentityGetMeIntegration.IntegrationId}"
      AuthorizerId: !Ref ApiGatewayAuthorizer
      AuthorizationType: CUSTOM

  IdentityChangePasswordIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt IdentityStack.Outputs.IdentityChangePasswordFunctionArn
      PayloadFormatVersion: '2.0'

  IdentityChangePasswordRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /v1/users/me/password
      Target: !Sub "integrations/${IdentityChangePasswordIntegration.IntegrationId}"
      AuthorizerId: !Ref ApiGatewayAuthorizer
      AuthorizationType: CUSTOM

  # ---------------------------------------------------------------------------
  # Census bounded context (nested stack) - Asignacion de Censos
  # ---------------------------------------------------------------------------
  CensusStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./contexts/census/template.yaml
      Parameters:
        Environment: !Ref Environment
        VpcSubnetIds: !Ref VpcSubnetIds
        LambdaSecurityGroupId: !Ref LambdaSecurityGroupId
        NodeSharedLayerArn: !Ref NodeSharedLayer
        NodeRuntimeLayerArn: !Ref NodeRuntimeLayer

  CensusListUnassignedIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt CensusStack.Outputs.CensusListUnassignedFunctionArn
      PayloadFormatVersion: '2.0'

  CensusListUnassignedRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /v1/census/homes/unassigned
      Target: !Sub "integrations/${CensusListUnassignedIntegration.IntegrationId}"
      AuthorizerId: !Ref ApiGatewayAuthorizer
      AuthorizationType: CUSTOM

  CensusAssignIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt CensusStack.Outputs.CensusAssignFunctionArn
      PayloadFormatVersion: '2.0'

  CensusAssignRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /v1/census/assignments
      Target: !Sub "integrations/${CensusAssignIntegration.IntegrationId}"
      AuthorizerId: !Ref ApiGatewayAuthorizer
      AuthorizationType: CUSTOM

  # ---------------------------------------------------------------------------
  # Lambda invoke permissions - allow API Gateway (HTTP API) to invoke each
  # AWS_PROXY-integrated function. Raw AWS::ApiGatewayV2::Integration does NOT
  # auto-create these (unlike SAM `Events`), so without them every route
  # returns 500 at runtime. The authorizer uses AuthorizerCredentialsArn
  # instead and therefore needs no permission here.
  # ---------------------------------------------------------------------------
  IdentityRegisterPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt IdentityStack.Outputs.IdentityRegisterFunctionArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*"

  IdentityLoginPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt IdentityStack.Outputs.IdentityLoginFunctionArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*"

  IdentityGetMePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt IdentityStack.Outputs.IdentityGetMeFunctionArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*"

  IdentityChangePasswordPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt IdentityStack.Outputs.IdentityChangePasswordFunctionArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*"

  CensusListUnassignedPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt CensusStack.Outputs.CensusListUnassignedFunctionArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*"

  CensusAssignPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt CensusStack.Outputs.CensusAssignFunctionArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*"

  # ---------------------------------------------------------------------------
  # Authorizer Lambda invoke permission.
  # The authorizer Lambda is invoked by API Gateway via the role referenced in
  # `ApiGatewayAuthorizer.AuthorizerCredentialsArn` (see
  # ApigatewayAuthorizerInvokeRoleArn parameter). That role is granted
  # `lambda:InvokeFunction` on the authorizer Lambda in
  # orion-infrastructure (currently a manually-created role; pending Terraform
  # module). However, we ALSO declare this AWS::Lambda::Permission resource as
  # a defense-in-depth measure: it explicitly permits API Gateway (any
  # source-arn scoped to this HTTP API) to invoke the authorizer function.
  # Without it, manual changes to the authorizer invoke role would silently
  # break all protected routes (the authorizer is on the hot path of every
  # protected request).
  # ---------------------------------------------------------------------------
  AuthorizerFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt AuthorizerStack.Outputs.AuthorizerFunctionArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*"

  # ---------------------------------------------------------------------------
  # Lambda Layers - shared kernel + runtime dependencies
  # ---------------------------------------------------------------------------
  NodeSharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "orion-node-shared-${Environment}"
      Description: Compiled @orion/shared workspace (built via npm run layer:build:all).
      ContentUri: ./layers/node-shared/
      CompatibleRuntimes: [nodejs24.x]
      RetentionPolicy: Retain

  NodeRuntimeLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "orion-node-runtime-${Environment}"
      Description: Runtime dependencies (jose, zod, middy, kysely, pg, powertools).
      ContentUri: ./layers/node-runtime/
      CompatibleRuntimes: [nodejs24.x]
      RetentionPolicy: Retain

  # ---------------------------------------------------------------------------
  # Application-wide log group
  # ---------------------------------------------------------------------------
  ApplicationLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/orion/${Environment}/application"
      RetentionInDays: 30

Outputs:
  HttpApiUrl:
    Description: Public URL of the ORION HTTP API.
    Value: !GetAtt HttpApi.ApiEndpoint
    Export:
      Name: !Sub "orion-http-api-url-${Environment}"

  HttpApiId:
    Description: HTTP API ID (for cross-stack references).
    Value: !Ref HttpApi
    Export:
      Name: !Sub "orion-http-api-id-${Environment}"

  NodeSharedLayerArn:
    Description: ARN of the shared kernel Lambda Layer.
    Value: !Ref NodeSharedLayer
    Export:
      Name: !Sub "orion-node-shared-layer-arn-${Environment}"

  NodeRuntimeLayerArn:
    Description: ARN of the runtime dependencies Lambda Layer.
    Value: !Ref NodeRuntimeLayer
    Export:
      Name: !Sub "orion-node-runtime-layer-arn-${Environment}"
