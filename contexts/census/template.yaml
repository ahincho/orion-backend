AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'ORION P1 bounded context: Asignacion de Censos.'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  VpcSubnetIds:
    Type: String
    Description: Comma-separated subnet IDs for VPC-attached Lambdas. Empty = no VPC attachment (local).
    Default: ''
  LambdaSecurityGroupId:
    Type: String
    Description: Security group ID attached to all Lambdas in this stack. Empty = no VPC attachment (local).
    Default: ''
  NodeSharedLayerArn:
    Type: String
    Description: ARN of the shared kernel Lambda Layer (passed from root stack).
  NodeRuntimeLayerArn:
    Type: String
    Description: ARN of the runtime dependencies Lambda Layer (passed from root stack).

Conditions:
  AttachToVpc: !And
    - !Not [!Equals [!Ref VpcSubnetIds, '']]
    - !Not [!Equals [!Ref LambdaSecurityGroupId, '']]

Globals:
  Function:
    Runtime: nodejs24.x
    MemorySize: 512
    Timeout: 15
    Tracing: Active
    Architectures: [x86_64]
    Layers:
      - !Ref NodeSharedLayerArn
      - !Ref NodeRuntimeLayerArn
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        LOG_LEVEL: INFO
        POWERTOOLS_SERVICE_NAME: !Sub 'orion-census-${Environment}'
        NODE_OPTIONS: --enable-source-maps
        DB_SECRET_ARN: '{{resolve:ssm:/orion/db/secret-arn}}'
        EVENT_BUS_ARN: '{{resolve:ssm:/orion/eventbridge/bus-arn}}'
        CORS_ORIGINS: '{{resolve:ssm:/orion/cors/allowed-origins}}'

Resources:
  CensusFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
        - !If
          - AttachToVpc
          - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
          - !Ref AWS::NoValue
      Policies:
        - PolicyName: CensusAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource:
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/orion/*'
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: '*'
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: '*'

  CensusListUnassignedFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'orion-census-list-unassigned-${Environment}'
      Handler: handlers/list-unassigned.handler
      CodeUri: ./dist
      Role: !GetAtt CensusFunctionRole.Arn
      VpcConfig: !If
        - AttachToVpc
        - SubnetIds: !Split [",", !Ref VpcSubnetIds]
          SecurityGroupIds:
            - !Ref LambdaSecurityGroupId
        - !Ref AWS::NoValue

  CensusAssignFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'orion-census-assign-${Environment}'
      Handler: handlers/assign.handler
      CodeUri: ./dist
      Role: !GetAtt CensusFunctionRole.Arn
      VpcConfig: !If
        - AttachToVpc
        - SubnetIds: !Split [",", !Ref VpcSubnetIds]
          SecurityGroupIds:
            - !Ref LambdaSecurityGroupId
        - !Ref AWS::NoValue

Outputs:
  CensusListUnassignedFunctionArn:
    Value: !GetAtt CensusListUnassignedFunction.Arn
    Export:
      Name: !Sub 'orion-census-list-unassigned-arn-${Environment}'
  CensusAssignFunctionArn:
    Value: !GetAtt CensusAssignFunction.Arn
    Export:
      Name: !Sub 'orion-census-assign-arn-${Environment}'
