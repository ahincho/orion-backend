AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'ORION identity bounded context: users, sessions, login, register.'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  VpcSubnetIds:
    Type: String
    Description: Comma-separated subnet IDs for VPC-attached Lambdas (private subnets where RDS lives). Empty = no VPC attachment (local).
    Default: ''
  LambdaSecurityGroupId:
    Type: String
    Description: Security group ID attached to all Lambdas in this stack. Empty = no VPC attachment (local).
    Default: ''
  NodeSharedLayerArn:
    Type: String
    Description: ARN of the shared kernel Lambda Layer (passed from root stack).
  NodeRuntimeLayerArn:
    Type: String
    Description: ARN of the runtime dependencies Lambda Layer (passed from root stack).

Conditions:
  AttachToVpc: !And
    - !Not [!Equals [!Ref VpcSubnetIds, '']]
    - !Not [!Equals [!Ref LambdaSecurityGroupId, '']]

Globals:
  Function:
    Runtime: nodejs24.x
    MemorySize: 512
    Timeout: 15
    Tracing: Active
    Architectures: [x86_64]
    Layers:
      - !Ref NodeSharedLayerArn
      - !Ref NodeRuntimeLayerArn
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        LOG_LEVEL: INFO
        POWERTOOLS_SERVICE_NAME: !Sub 'orion-identity-${Environment}'
        NODE_OPTIONS: --enable-source-maps
        DB_SECRET_ARN: '{{resolve:ssm:/orion/db/secret-arn~true}}'
        EVENT_BUS_ARN: '{{resolve:ssm:/orion/eventbridge/bus-arn~true}}'
        CORS_ORIGINS: '{{resolve:ssm:/orion/cors/allowed-origins~true}}'

Resources:
  IdentityFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
        - !If
          - AttachToVpc
          - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
          - !Ref AWS::NoValue
      Policies:
        - PolicyName: IdentityAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource:
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/orion/*'
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: '*'
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: '*'
              # kms:Decrypt sobre las AWS-managed keys (SSM + Secrets Manager).
              # Sin esto, `ssm:GetParameter` sobre un SecureString devuelve el
              # ciphertext en vez del valor descifrado, y la cadena
              # `ssm.getRequiredString('/orion/db/secret-arn') -> secrets.getJson(arn)`
              # falla con "Secrets Manager can't find the specified secret"
              # (porque el Lambda pasa el ciphertext como SecretId).
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource:
                  - !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/ssm'
                  - !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/secretsmanager'

  IdentityRegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'orion-identity-register-${Environment}'
      Handler: handlers/register.handler
      CodeUri: ./dist
      Role: !GetAtt IdentityFunctionRole.Arn
      VpcConfig: !If
        - AttachToVpc
        - SubnetIds: !Split [",", !Ref VpcSubnetIds]
          SecurityGroupIds:
            - !Ref LambdaSecurityGroupId
        - !Ref AWS::NoValue

  IdentityLoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'orion-identity-login-${Environment}'
      Handler: handlers/login.handler
      CodeUri: ./dist
      Role: !GetAtt IdentityFunctionRole.Arn
      VpcConfig: !If
        - AttachToVpc
        - SubnetIds: !Split [",", !Ref VpcSubnetIds]
          SecurityGroupIds:
            - !Ref LambdaSecurityGroupId
        - !Ref AWS::NoValue

  IdentityGetMeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'orion-identity-get-me-${Environment}'
      Handler: handlers/get-me.handler
      CodeUri: ./dist
      Role: !GetAtt IdentityFunctionRole.Arn
      VpcConfig: !If
        - AttachToVpc
        - SubnetIds: !Split [",", !Ref VpcSubnetIds]
          SecurityGroupIds:
            - !Ref LambdaSecurityGroupId
        - !Ref AWS::NoValue

  IdentityChangePasswordFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'orion-identity-change-password-${Environment}'
      Handler: handlers/change-password.handler
      CodeUri: ./dist
      Role: !GetAtt IdentityFunctionRole.Arn
      VpcConfig: !If
        - AttachToVpc
        - SubnetIds: !Split [",", !Ref VpcSubnetIds]
          SecurityGroupIds:
            - !Ref LambdaSecurityGroupId
        - !Ref AWS::NoValue

  # One-shot migration runner (TEMPORAL). Applies any *.sql file under
  # dist/migrations against the configured RDS using the same Pool the
  # service handlers use. Will be removed once the project has a proper
  # CI-driven migration step (npm run migrate:up running from a CI job
  # with VPC access, e.g. SSM port-forward to the RDS). Until then, the
  # deploy workflow can invoke this function once after the stack
  # reaches UPDATE_COMPLETE to bootstrap the `identity.users` table.
  IdentityMigrateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'orion-identity-migrate-${Environment}'
      Handler: handlers/migrate.handler
      CodeUri: ./dist
      Role: !GetAtt IdentityFunctionRole.Arn
      VpcConfig: !If
        - AttachToVpc
        - SubnetIds: !Split [",", !Ref VpcSubnetIds]
          SecurityGroupIds:
            - !Ref LambdaSecurityGroupId
        - !Ref AWS::NoValue

Outputs:
  IdentityRegisterFunctionArn:
    Value: !GetAtt IdentityRegisterFunction.Arn
    Export:
      Name: !Sub 'orion-identity-register-arn-${Environment}'
  IdentityLoginFunctionArn:
    Value: !GetAtt IdentityLoginFunction.Arn
    Export:
      Name: !Sub 'orion-identity-login-arn-${Environment}'
  IdentityGetMeFunctionArn:
    Value: !GetAtt IdentityGetMeFunction.Arn
    Export:
      Name: !Sub 'orion-identity-get-me-arn-${Environment}'
  IdentityChangePasswordFunctionArn:
    Value: !GetAtt IdentityChangePasswordFunction.Arn
    Export:
      Name: !Sub 'orion-identity-change-password-arn-${Environment}'
