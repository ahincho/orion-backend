AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'ORION identity bounded context: users, sessions, login, register.'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  VpcSubnetIds:
    Type: String
    Description: Comma-separated subnet IDs for VPC-attached Lambdas (private subnets where RDS lives). Empty = no VPC attachment (local).
    Default: ''
  LambdaSecurityGroupId:
    Type: String
    Description: Security group ID attached to all Lambdas in this stack. Empty = no VPC attachment (local).
    Default: ''
  NodeSharedLayerArn:
    Type: String
    Description: ARN of the shared kernel Lambda Layer (passed from root stack).
  NodeRuntimeLayerArn:
    Type: String
    Description: ARN of the runtime dependencies Lambda Layer (passed from root stack).
  # -------------------------------------------------------------------------
  # Stage 6 (ADR 0010 user-management) — bootstrap-supervisor + seed-users
  # Lambdas. They share the dedicated IAM role provisioned by
  # modules/seed-users in orion-infrastructure
  # (orion-seed-users-lambda-exec-<env>). Its ARN is published to
  # `/orion/iam/seed-users-lambda-exec-role-arn` and resolved by the
  # CD - Deploy workflow at deploy time; we accept it here as a SAM
  # parameter (no default — same pattern as ApigatewayAuthorizerInvokeRoleArn
  # in the root stack).
  #
  # The SM secret ARN for the shared dev password is resolved at runtime by
  # the handlers (via ssm.getRequiredString('/orion/seed/shared-dev-password-
  # secret-arn')) to keep the wiring out of the SAM parameter surface, but is
  # ALSO injectable via SHARED_DEV_PASSWORD_SECRET_ARN env var so the cookbook
  # `aws-lambda-invoke.yml` recipe can override it on demand.
  # -------------------------------------------------------------------------
  SeedUsersLambdaExecRoleArn:
    Type: String
    Description: 'ARN del IAM Lambda execution role (`orion-seed-users-lambda-exec-<env>`) que asumen las Lambdas `bootstrap-supervisor` + `seed-users`. Provisionado por `modules/seed-users` en orion-infrastructure (terraform apply). Resuelto via SSM `/orion/iam/seed-users-lambda-exec-role-arn` por `CD - Deploy` y pasado como `--parameter-overrides`. No Default: fail-fast en deploy si falta.'
    Default: ''

Conditions:
  AttachToVpc: !And
    - !Not [!Equals [!Ref VpcSubnetIds, '']]
    - !Not [!Equals [!Ref LambdaSecurityGroupId, '']]

Globals:
  Function:
    Runtime: nodejs24.x
    MemorySize: 512
    Timeout: 15
    Tracing: Active
    Architectures: [x86_64]
    Layers:
      - !Ref NodeSharedLayerArn
      - !Ref NodeRuntimeLayerArn
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        LOG_LEVEL: INFO
        POWERTOOLS_SERVICE_NAME: !Sub 'orion-identity-${Environment}'
        NODE_OPTIONS: --enable-source-maps
        # Runtime config (DB secret ARN, event bus ARN, CORS origins) is read
        # directly from SSM at runtime by the Lambda handlers via
        # @orion/shared/infra. See template.yaml header for rationale.

Resources:
  IdentityFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
        - !If
          - AttachToVpc
          - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
          - !Ref AWS::NoValue
      Policies:
        - PolicyName: IdentityAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource:
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/orion/*'
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: '*'
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: '*'
              # kms:Decrypt sobre las AWS-managed keys (SSM + Secrets Manager).
              # Sin esto, `ssm:GetParameter` sobre un SecureString devuelve el
              # ciphertext en vez del valor descifrado, y la cadena
              # `ssm.getRequiredString('/orion/db/secret-arn') -> secrets.getJson(arn)`
              # falla con "Secrets Manager can't find the specified secret"
              # (porque el Lambda pasa el ciphertext como SecretId).
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource:
                  - !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/ssm'
                  - !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/secretsmanager'

  IdentityRegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'orion-identity-register-${Environment}'
      Handler: handlers/register.handler
      CodeUri: ./dist
      Role: !GetAtt IdentityFunctionRole.Arn
      VpcConfig: !If
        - AttachToVpc
        - SubnetIds: !Split [",", !Ref VpcSubnetIds]
          SecurityGroupIds:
            - !Ref LambdaSecurityGroupId
        - !Ref AWS::NoValue

  IdentityLoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'orion-identity-login-${Environment}'
      Handler: handlers/login.handler
      CodeUri: ./dist
      Role: !GetAtt IdentityFunctionRole.Arn
      VpcConfig: !If
        - AttachToVpc
        - SubnetIds: !Split [",", !Ref VpcSubnetIds]
          SecurityGroupIds:
            - !Ref LambdaSecurityGroupId
        - !Ref AWS::NoValue

  IdentityGetMeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'orion-identity-get-me-${Environment}'
      Handler: handlers/get-me.handler
      CodeUri: ./dist
      Role: !GetAtt IdentityFunctionRole.Arn
      VpcConfig: !If
        - AttachToVpc
        - SubnetIds: !Split [",", !Ref VpcSubnetIds]
          SecurityGroupIds:
            - !Ref LambdaSecurityGroupId
        - !Ref AWS::NoValue

  IdentityChangePasswordFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'orion-identity-change-password-${Environment}'
      Handler: handlers/change-password.handler
      CodeUri: ./dist
      Role: !GetAtt IdentityFunctionRole.Arn
      VpcConfig: !If
        - AttachToVpc
        - SubnetIds: !Split [",", !Ref VpcSubnetIds]
          SecurityGroupIds:
            - !Ref LambdaSecurityGroupId
        - !Ref AWS::NoValue

  # ---------------------------------------------------------------------------
  # Administrative user-management endpoints (Stage 3 of the user-management
  # feature plan). All 5 lambdas share the same role + VPC config as the
  # existing Identity* functions; only the handler file differs. Wiring
  # (Integrations + Routes + Permissions) lives in the root template.yaml.
  # ---------------------------------------------------------------------------

  IdentityListUsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'orion-identity-list-users-${Environment}'
      Handler: handlers/list-users.handler
      CodeUri: ./dist
      Role: !GetAtt IdentityFunctionRole.Arn
      VpcConfig: !If
        - AttachToVpc
        - SubnetIds: !Split [",", !Ref VpcSubnetIds]
          SecurityGroupIds:
            - !Ref LambdaSecurityGroupId
        - !Ref AWS::NoValue

  IdentityGetUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'orion-identity-get-user-${Environment}'
      Handler: handlers/get-user.handler
      CodeUri: ./dist
      Role: !GetAtt IdentityFunctionRole.Arn
      VpcConfig: !If
        - AttachToVpc
        - SubnetIds: !Split [",", !Ref VpcSubnetIds]
          SecurityGroupIds:
            - !Ref LambdaSecurityGroupId
        - !Ref AWS::NoValue

  IdentityUpdateUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'orion-identity-update-user-${Environment}'
      Handler: handlers/update-user.handler
      CodeUri: ./dist
      Role: !GetAtt IdentityFunctionRole.Arn
      VpcConfig: !If
        - AttachToVpc
        - SubnetIds: !Split [",", !Ref VpcSubnetIds]
          SecurityGroupIds:
            - !Ref LambdaSecurityGroupId
        - !Ref AWS::NoValue

  IdentityDeactivateUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'orion-identity-deactivate-user-${Environment}'
      Handler: handlers/deactivate-user.handler
      CodeUri: ./dist
      Role: !GetAtt IdentityFunctionRole.Arn
      VpcConfig: !If
        - AttachToVpc
        - SubnetIds: !Split [",", !Ref VpcSubnetIds]
          SecurityGroupIds:
            - !Ref LambdaSecurityGroupId
        - !Ref AWS::NoValue

  IdentityActivateUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'orion-identity-activate-user-${Environment}'
      Handler: handlers/activate-user.handler
      CodeUri: ./dist
      Role: !GetAtt IdentityFunctionRole.Arn
      VpcConfig: !If
        - AttachToVpc
        - SubnetIds: !Split [",", !Ref VpcSubnetIds]
          SecurityGroupIds:
            - !Ref LambdaSecurityGroupId
        - !Ref AWS::NoValue

  # One-shot migration runner (TEMPORAL). Applies any *.sql file under
  # dist/migrations against the configured RDS using the same Pool the
  # service handlers use. Will be removed once the project has a proper
  # CI-driven migration step (npm run migrate:up running from a CI job
  # with VPC access, e.g. SSM port-forward to the RDS). Until then, the
  # deploy workflow can invoke this function once after the stack
  # reaches UPDATE_COMPLETE to bootstrap the `identity.users` table.
  IdentityMigrateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'orion-identity-migrate-${Environment}'
      Handler: handlers/migrate.handler
      CodeUri: ./dist
      Role: !GetAtt IdentityFunctionRole.Arn
      VpcConfig: !If
        - AttachToVpc
        - SubnetIds: !Split [",", !Ref VpcSubnetIds]
          SecurityGroupIds:
            - !Ref LambdaSecurityGroupId
        - !Ref AWS::NoValue

  # ----------------------------------------------------------------------------
  # Smoke test cleanup (dev-only, internal). Invoked directly via
  # `aws lambda invoke` from the Smoke Test - orion-backend-dev workflow after
  # the test passes, to remove the test user created during the run. Not
  # exposed via API Gateway. The GH deploy OIDC role already grants
  # `lambda:InvokeFunction` on `orion-*-dev` ARNs (orion-infrastructure
  # modules/iam-sam-deploy-dev/main.tf, LambdaManageFunctions statement), so
  # no AWS::Lambda::Permission resource is needed here. A new permission would
  # require a SourceArn (per the lambda-permission-source-arn custom check
  # in orion-backend) but this Lambda has no event source - it is invoked
  # directly.
  # ----------------------------------------------------------------------------
  IdentitySmokeTestCleanupFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'orion-identity-smoke-test-cleanup-${Environment}'
      Handler: handlers/smoke-test-cleanup.handler
      CodeUri: ./dist
      Role: !GetAtt IdentityFunctionRole.Arn
      MemorySize: 256
      Timeout: 15
      VpcConfig: !If
        - AttachToVpc
        - SubnetIds: !Split [",", !Ref VpcSubnetIds]
          SecurityGroupIds:
            - !Ref LambdaSecurityGroupId
        - !Ref AWS::NoValue
      # Distinct Powertools service name so CloudWatch Insights queries can
      # filter cleanup invocations separately from the user-facing handlers.
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: !Sub 'orion-identity-smoke-test-cleanup-${Environment}'

  # ---------------------------------------------------------------------------
  # Stage 6 of ADR 0010 user-management — bootstrap-supervisor + seed-users.
  #
  # These two Lambdas are invoked directly via `aws lambda invoke` from the GH
  # Actions workflows `Bootstrap Supervisor - orion-backend-dev` and
  # `Seed Users - orion-backend-dev`. They are NOT exposed via API Gateway.
  #
  # They assume the dedicated IAM role `SeedUsersLambdaExecRoleArn` provisioned
  # by orion-infrastructure `modules/seed-users`. The inline policy of that
  # role grants:
  #   - secretsmanager:GetSecretValue/DescribeSecret over
  #     (a) the shared dev password secret (Stage 4 output)
  #     (b) the RDS app connection secret (Stage 4 output, from input)
  #   - ssm:GetParameter(s) over /orion/seed/email-domain + /orion/db/secret-arn
  #   - ec2:* ENI mgmt + Describe* (VPC attachment)
  #   - logs:CreateLogGroup/Stream, PutLogEvents, Describe* on log groups
  #     orion-bootstrap-supervisor-<env>, orion-seed-users-<env>, orion-seed-<env>-*
  #   - xray:PutTraceSegments/TelemetryRecords/GetTraceSummaries/BatchGetTraces
  #   - kms:Decrypt/GenerateDataKey/DescribeKey scoped to Project=orion +
  #     Environment=<env> tag-condition.
  # Cf. orion-infrastructure modules/seed-users/main.tf (Stage 4 + bridge PR #91).
  #
  # Both Lambdas have `SHARED_DEV_PASSWORD_SECRET_ARN` injected as env var to
  # avoid an SSM read per invocation (the ARN itself is public but the secret
  # value requires secretsmanager:GetSecretValue); the cookbook
  # `aws-lambda-invoke.yml` can override the env var at invoke time if needed.
  # ---------------------------------------------------------------------------
  IdentityBootstrapSupervisorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'orion-identity-bootstrap-supervisor-${Environment}'
      Handler: handlers/bootstrap-supervisor.handler
      CodeUri: ./dist
      # The Stage 4 IAM role. IdentityFunctionRole deliberately omits SM access
      # on /orion/seed/shared-dev-password (only Project=orion tag-gated access);
      # seed-users + bootstrap-supervisor use the more permissive
      # SeedUsersLambdaExecRoleArn explicitly scoped to the 2 specific secrets
      # + 1 specific SSM param.
      Role: !Ref SeedUsersLambdaExecRoleArn
      MemorySize: 512
      Timeout: 30
      VpcConfig: !If
        - AttachToVpc
        - SubnetIds: !Split [",", !Ref VpcSubnetIds]
          SecurityGroupIds:
            - !Ref LambdaSecurityGroupId
        - !Ref AWS::NoValue
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          LOG_LEVEL: INFO
          POWERTOOLS_SERVICE_NAME: !Sub 'orion-identity-bootstrap-supervisor-${Environment}'
          NODE_OPTIONS: --enable-source-maps
          SHARED_DEV_PASSWORD_SECRET_ARN: !Sub '{{resolve:ssm:/orion/seed/shared-dev-password-secret-arn}}'

  IdentitySeedUsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'orion-identity-seed-users-${Environment}'
      Handler: handlers/seed-users.handler
      CodeUri: ./dist
      Role: !Ref SeedUsersLambdaExecRoleArn
      MemorySize: 512
      Timeout: 60
      VpcConfig: !If
        - AttachToVpc
        - SubnetIds: !Split [",", !Ref VpcSubnetIds]
          SecurityGroupIds:
            - !Ref LambdaSecurityGroupId
        - !Ref AWS::NoValue
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          LOG_LEVEL: INFO
          POWERTOOLS_SERVICE_NAME: !Sub 'orion-identity-seed-users-${Environment}'
          NODE_OPTIONS: --enable-source-maps
          SHARED_DEV_PASSWORD_SECRET_ARN: !Sub '{{resolve:ssm:/orion/seed/shared-dev-password-secret-arn}}'

Outputs:
  IdentityRegisterFunctionArn:
    Value: !GetAtt IdentityRegisterFunction.Arn
    Export:
      Name: !Sub 'orion-identity-register-arn-${Environment}'
  IdentityLoginFunctionArn:
    Value: !GetAtt IdentityLoginFunction.Arn
    Export:
      Name: !Sub 'orion-identity-login-arn-${Environment}'
  IdentityGetMeFunctionArn:
    Value: !GetAtt IdentityGetMeFunction.Arn
    Export:
      Name: !Sub 'orion-identity-get-me-arn-${Environment}'
  IdentityChangePasswordFunctionArn:
    Value: !GetAtt IdentityChangePasswordFunction.Arn
    Export:
      Name: !Sub 'orion-identity-change-password-arn-${Environment}'
  IdentitySmokeTestCleanupFunctionArn:
    Value: !GetAtt IdentitySmokeTestCleanupFunction.Arn
    Export:
      Name: !Sub 'orion-identity-smoke-test-cleanup-arn-${Environment}'
  IdentityListUsersFunctionArn:
    Value: !GetAtt IdentityListUsersFunction.Arn
    Export:
      Name: !Sub 'orion-identity-list-users-arn-${Environment}'
  IdentityGetUserFunctionArn:
    Value: !GetAtt IdentityGetUserFunction.Arn
    Export:
      Name: !Sub 'orion-identity-get-user-arn-${Environment}'
  IdentityUpdateUserFunctionArn:
    Value: !GetAtt IdentityUpdateUserFunction.Arn
    Export:
      Name: !Sub 'orion-identity-update-user-arn-${Environment}'
  IdentityDeactivateUserFunctionArn:
    Value: !GetAtt IdentityDeactivateUserFunction.Arn
    Export:
      Name: !Sub 'orion-identity-deactivate-user-arn-${Environment}'
  IdentityActivateUserFunctionArn:
    Value: !GetAtt IdentityActivateUserFunction.Arn
    Export:
      Name: !Sub 'orion-identity-activate-user-arn-${Environment}'
  IdentityBootstrapSupervisorFunctionArn:
    Value: !GetAtt IdentityBootstrapSupervisorFunction.Arn
    Export:
      Name: !Sub 'orion-identity-bootstrap-supervisor-arn-${Environment}'
  IdentitySeedUsersFunctionArn:
    Value: !GetAtt IdentitySeedUsersFunction.Arn
    Export:
      Name: !Sub 'orion-identity-seed-users-arn-${Environment}'
